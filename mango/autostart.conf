#!/bin/bash
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=swaync -c ~/.config/mango/swaync/config.jsonc -s ~/.config/mango/swaync/style.css
exec-once=wlsunset -T 3501 -t 3500
exec-once=awww-daemon
exec-once=awww img ~/.config/mango/wallpaper/wallpaper.png
exec-once=waybar -c ~/.config/mango/waybar/config.jsonc -s ~/.config/mango/waybar/style.css
exec-once=echo "Xft.dpi: 140" | xrdb -merge
exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0
exec=once=wl-paste --type text --watch cliphist store
exec-once=blueman-applet
exec-once=nm-applet
exec-once=/usr/lib/soteria-polkit/soteria
exec-once=sway-audio-idle-inhibit
exec-once=swayosd-server
